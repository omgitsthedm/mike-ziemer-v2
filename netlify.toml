[build]
  publish = "."
  command = "echo 'No build command needed - static site'"

# AI-Ops: keep internal docs private (forced 404). Do not remove.
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/AGENTS.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.ai/*"
  to = "/404.html"
  status = 404
  force = true
